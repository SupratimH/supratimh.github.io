# ============================================================
# PROJECT INFORMATION
# ============================================================
# Basic site metadata and author information
site_name: Supratim Haldar
site_url: https://supratimh.github.io
site_author: Supratim Haldar
site_description: Personal website of Supratim Haldar - AI, Data & Product Expert

# repo_name: supratimh/supratimh.github.io
# repo_url: https://github.com/supratimh/supratimh.github.io
copyright: "Copyright &copy; 2026 Supratim Haldar"

# ============================================================
# BUILD CONFIGURATION
# ============================================================
docs_dir: docs
site_dir: site

# ============================================================
# MARKDOWN EXTENSIONS
# ============================================================
# Enhanced markdown support for rich content
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: false
      toc_depth: 4
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences:
      custom_fences:
        - name: python
          class: python
          # validator: !!python/name:pymdownx.superfences.fence_code_validator

# ============================================================
# THEME CONFIGURATION
# ============================================================
# Material Design theme with custom customizations
theme:
  name: material
  
  # Theme customization overrides
  custom_dir: overrides
  
  # Color scheme configuration
  palette:
    # Light mode theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: yellow
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    
    # Dark mode theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: yellow
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  
  font:
    text: Lato
    code: Roboto Mono

  # Language and branding
  language: en
  logo: image/logo_sh.png
  favicon: image/logo_sh.png
  
  # Essential Material theme features
  features:
    # Navigation tabs on top and sticky
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.instant # Instant loading for faster navigation
    # - navigation.expand # Navigation expansion control
    - navigation.tracking # Track which link is currently viewed
    
    # Allow linking between tabs
    - content.tabs.link
    
    # Keep header always visible (don't hide on scroll)
    # - header.autohide  # DISABLED - keep header always visible
    
    # TOC stays on the right side (default), keeping left sidebar stable
    # - toc.integrate  # DISABLED - causes sidebar width to shift per page
    - toc.follow        # TOC follows scroll

# ============================================================
# PLUGINS
# ============================================================
# Extended functionality for the site
plugins:
  # Search functionality
  - search:
      lang: en
      separator: '[\s\-_,:!=\[\]()"`/]+'
      
  # Blog functionality (categories, tags, and archive auto-generated)
  - blog:
      blog_dir: blog
      blog_toc: true
      categories_allowed:
        - Data Science
        - Machine Learning
        - Artificial Intelligence
        - Product & Solution
        - Software Engineering
        - Technical Deep Dive
  - tags

# ============================================================
# EXTRA CSS and JavaScript
# ============================================================
# Custom styling for the website
extra_css:
  - css/custom.css

# extra_javascript:
#   - javascripts/extra.js

# ============================================================
# NAVIGATION STRUCTURE
# ============================================================
# Main sidebar navigation - automatically appears as tabs on top
nav:
  - About: index.md
  - Work: work.md
  - Projects: project.md
  - Blog:
    - blog/index.md
  - Contact: contact.md

